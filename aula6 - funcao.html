        function converterReaisParaDolares(valor, dolar) {
            return 'U$$' + (valor / dolar).toFixed(2).replace('.',',') + '<br>'
        }
        function converterRealDolar(valor, dolar) {
            document.write('U$$' + (valor / dolar).toFixed(2).replace('.',',') + '<br>')
        }
        document.write(converterReaisParaDolares(10000, cotacaoDolar))
        document.write(converterReaisParaDolares(12000, cotacaoDolar))
        document.write(converterReaisParaDolares(15000, cotacaoDolar))
