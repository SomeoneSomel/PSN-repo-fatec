<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de média</title>
    <link rel="stylesheet" href="provaestilo.css">  
</head>
<header>
    <h1 id="titulo">Cálculo de Média</h1>
    <h3>Insira as notas para o calculo</h3>
</header>
<body>
    <b>Nota 1:</b>
    <input type="number" id="nota1"></input>
    <br><br>
    <b>Nota 2:</b>
    <input type="number" id="nota2"></input>
    <br><br>
    <button id="btncalc">Calcular</button>
    <br><br>
    <p><b id="resultado">Resultado: </b></p>
    <p><b id="situacao">Situação: </b></p>
    <h2>Historico de Calculos</h2>
    <div id="historico">

    </div>
</body>
<script>
    function CalcularMedia(nota1, nota2) {
        return ((nota1 + nota2)/ 2) 
    }
    document.getElementById('btncalc').onclick = function() {
        let nota1 = document.getElementById('nota1').value
        let nota2 = document.getElementById('nota2').value
        nota1 = parseFloat(nota1)
        nota2 = parseFloat(nota2)
        historico = []
        resultado = CalcularMedia(nota1, nota2)
        novoresultado = 0
        if (resultado >= 6) {
            document.getElementById('resultado').innerHTML = 'Resultado: ' + resultado    
            document.getElementById('situacao').innerHTML = 'Situação: Aprovado!'
            historico.push(`N1= ${nota1} | N2= ${nota2} | M= ${resultado} | APROVADO`)
            for (let i in historico) {
                document.getElementById('historico').innerHTML += historico[i] + '<br>'
            }
        }
        else {
            recuperacao = prompt('O aluno irá ficar com uma média abaixo de 6. Insira uma nota de recuperação')
            if (nota1 < nota2) {
                recuperacao = parseFloat(recuperacao)
                nota1 = recuperacao

            } else {
                recuperacao = parseFloat(recuperacao)
                nota2 = recuperacao
            }
            
            novoresultado =CalcularMedia(nota1, nota2)

            if (novoresultado >= 6) {
            document.getElementById('resultado').innerHTML = 'Resultado: ' + resultado    
            document.getElementById('situacao').innerHTML = 'Situação: Aprovado!'
            historico.push(`N1= ${nota1} | N2= ${nota2} | M= ${resultado} | R=${recuperacao} | NOVAMEDIA = ${novoresultado} | APROVADO`)
            for (let i in historico) {
                document.getElementById('historico').innerHTML += historico[i] + '<br>'
            }
            } else {
                document.getElementById('resultado').innerHTML = 'Resultado: ' + resultado    
            document.getElementById('situacao').innerHTML = 'Situação: Reprovado!'
            historico.push(`N1= ${nota1} | N2= ${nota2} | M= ${resultado} | R=${recuperacao} | NOVAMEDIA = ${novoresultado} | REPROVADO`)
            for (let i in historico) {
                document.getElementById('historico').innerHTML += historico[i] + '<br>'
            }
            }
        }
    }
        

</script>
</html>
