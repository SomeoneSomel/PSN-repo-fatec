<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora 2000</title>
</head>
<body>
    <script type = 'text/javascript'>
        let n1 = 0
        let n2 = 0
        let op = ''
        answer = 'sim'
        
       
        while (answer == 'sim'){
            n1 = parseFloat(prompt('informe o primeiro numero:'))
            n2 = parseFloat(prompt('informe o segundo numero:'))
            op = prompt('qual a operação realizada?\nOpções: Divisão, Multiplicação, Soma, Subtração.')
            op = op.toLowerCase()
                if (isNaN(n1) || isNaN(n2) ) {
                   answer = prompt(`você não digitou um numero. deseja tentar novamente?`)
                    answer = answer.toLowerCase()
                    document.write("digite somente numeros.")
                } else {
                    switch (op) {
                        case 'divisão':
                            if (n2 == 0) {
                                document.write('impossivel dividir por zero')
                            }else {
                                result = n1 / n2
                                document.write(`o resultado é ${result}`)
                            }
                            break
                        case 'multiplicação':
                            result = n1 * n2
                            document.write(`o resultado é ${result}`)
                            break
                        case 'soma':
                            result = n1 + n2
                            document.write(`o resultado é ${result}`)
                            break
                        case 'subtração':
                            result = n1 - n2
                            document.write(`o resultado é ${result}`)
                            break
                        default:
                            document.write(`você não digitou uma operação ou escreveu errado. foi escrito "${op}"`)
                    }
                    answer = prompt(`o resultado foi ${result}. \ndeseja fazer a operação novamente?`)
                    answer = answer.toLowerCase()    
                }
              
        }
    </script>
</body>
</html>
