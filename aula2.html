<!-- começando -->

<!DOCTYPE html>
<html lang="pt-br"> <!-- colocar isso para navegador entender que lingua é -->
    <!-- Exemplo de anotação / comentário  -->
    <!-- Nota: usar ctrl ; faz automatico -->
    <head>  
        <!-- isso serve para dizer ao navegador o formato de caracteres usar -->
        <meta charset="UTF-8">
        <title>Aula 2</title> <!--nome da pag-->
    </head>
    <body>
        <header> <!-- img é para colocar imagens, alt é para botar legenda na imagem quando não carrega -->
            <img src="funny.webp" alt="Engraçado pessoa atirando em peixe" width="500"> <!-- alternativamente, é possivel usar por exemplo width="50%" -->
        </header>
        <nav> <!-- isso é para fazer texto com links, tipo aqueles "saiba mais" em uns sites -->
            <a href="aula2.html">Aula2</a> <br>
            <a href="http://www.fatectq.edu.br" target="_blank">Fatec</a> <br> <!-- bom notar que target="blank" vai fazer que quando clique no link,
            ele vai criar uma nova guia pro site ao inves de substituir o que voce ja esta, no caso, esse site. -->
            <a href="https://www.google.com" target="_blank">Google</a>
        </nav>
        <main>
                <h1>Lista de Compras</h1> 
                <ol> <!-- aqui esta colocando para fazer uma lista, como uma lista de compras. o "ol" esta colocando essa lista para ser numerada. -->
                    <li>Arroz</li><!-- "li" é cada linha dessa lista -->
                    <li>Feijão</li>
                    <li>Chocolate</li>
                    <li>Mamão</li>
                </ol>
            <label for="fname">Escreva algo!</label>
            <input type="text" id="fname" name="fname">
            <input type="submit" value="Enviar!">
            </main>
        <footer>
            <p>&copy;Programação de Scritps</p> <!-- &copy; é só o simbolo de copyright, aquela bolinha com um c dentro -->
        </footer>
    </body>
</html>
