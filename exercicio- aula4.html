<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type = 'text/javascript'>
        let n1 = parseFloat(prompt('informe o primeiro numero:'))
        let n2 = parseFloat(prompt('informe a segunda numero:'))
        let op = prompt('qual a operação realizada?\nOpções: Divisão, Multiplicação, Soma, Subtração.')
        op = op.toLowerCase()
        if (isNaN(n1) || isNaN(n2) ) {
            document.write('informe apenas numeros')
        } else {
            switch (op) {
                case 'divisão':
                    if (n2 == 0) {
                        document.write('impossivel dividir por zero')
                    }else {
                        result = n1 / n2
                        document.write(`o resultado é ${result}`)
                    }
                    break
                case 'multiplicação':
                    result = n1 * n2
                    document.write(`o resultado é ${result}`)
                    break
                case 'soma':
                    result = n1 + n2
                    document.write(`o resultado é ${result}`)
                    break
                case 'subtração':
                    result = n1 - n2
                    document.write(`o resultado é ${result}`)
                    break
                default:
                    document.write(`você não digitou uma operação ou escreveu errado. foi escrito ${op}`)
            }
        }
    </script>
</body>
</html>
